<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Dashboard | SkillSwapHub</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:400;600;700&family=Poppins:400;600;700&display=swap" rel="stylesheet">

  <!-- Vendor CSS -->
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">

  <!-- Main CSS -->
  <link href="assets/css/main.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css?v=2">
</head>
<body class="light-background">

  <!-- Global Header remains clean white -->
  <header id="header" class="header d-flex align-items-center">
    <div class="container-fluid position-relative d-flex align-items-center px-4">
      <a href="dashboard.html" class="logo d-flex align-items-center me-auto text-decoration-none">
        <h1 class="sitename mb-0 fs-3">SkillSwapHub</h1>
      </a>
      <div class="d-flex align-items-center gap-3">
        <span class="text-muted small d-none d-md-block" id="header-user-name">Welcome</span>
        <a href="#" onclick="logout(); return false;" class="btn btn-outline-primary btn-sm px-3"><i class="bi bi-box-arrow-right me-1"></i> Logout</a>
      </div>
    </div>
  </header>

  <div class="dashboard-wrapper">
    <!-- Sidebar -->
    <aside class="dashboard-sidebar">
      <div class="mb-4 d-none d-md-block px-3">
        <p class="text-uppercase small fw-bold text-muted mb-2 tracking-wider">Main Menu</p>
      </div>
      <nav class="nav flex-column gap-2 border-0">
        <a class="nav-link active text-decoration-none" href="dashboard.html">
          <i class="bi bi-grid-1x2-fill"></i> My Dashboard
        </a>
        <a class="nav-link text-decoration-none" href="browse-skills.html">
          <i class="bi bi-search"></i> Browse Skills
        </a>
        <a class="nav-link text-decoration-none" href="profile.html">
          <i class="bi bi-person-circle"></i> User Profile
        </a>
        <a class="nav-link text-decoration-none mt-4 " href="#" onclick="logout(); return false;">
          <i class="bi bi-box-arrow-left"></i> Sign Out
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-content w-100">
      
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="fw-bold mb-1">Your Dashboard</h2>
          <p class="text-muted mb-0">Manage your skills and skill-swap requests</p>
        </div>
      </div>

      <div class="row">
        <!-- Swap Requests Column -->
        <div class="col-lg-8 mb-4">
          <div class="dashboard-card h-100 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
              <h4 class="fw-bold m-0"><i class="bi bi-arrow-left-right text-primary me-2"></i> Skill Swap Requests</h4>
            </div>
            <div id="pending-requests" class="d-flex flex-column gap-3">
              <div class="text-center py-5 text-muted">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Loading requests...</p>
              </div>
            </div>
          </div>
        </div>

        <!-- My Skills Column -->
        <div class="col-lg-4 mb-4">
          <div class="dashboard-card h-100 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
              <h4 class="fw-bold m-0"><i class="bi bi-stars text-warning me-2"></i> My Skills</h4>
            </div>
            <a href="add-skill.html" class="btn btn-primary-custom w-100 mb-4 text-decoration-none text-center">
              <i class="bi bi-plus-lg me-1"></i> Add Skill
            </a>
            <div id="my-skills-list" class="d-flex flex-column gap-3">
              <div class="text-center py-5 text-muted">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Loading skills...</p>
              </div>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <footer class="custom-footer text-center py-4">
    <div class="container">
      <p class="mb-0">© <strong>SkillSwapHub</strong> All Rights Reserved. Swap skills, not money!</p>
    </div>
  </footer>

  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../js/dashboard.js"></script>
  <script>
    // Just a quick visual flair
    const uName = localStorage.getItem("userName");
    if(uName) document.getElementById("header-user-name").textContent = "Welcome, " + uName;
  </script>
</body>
</html>
