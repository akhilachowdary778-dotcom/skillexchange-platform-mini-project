<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Add Skill | SkillSwapHub</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:400;600;700&family=Poppins:400;600;700&display=swap" rel="stylesheet">

  <!-- Vendor CSS -->
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">

  <!-- Main CSS -->
  <link href="assets/css/main.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css?v=2">
</head>
<body class="light-background">

  <!-- Global Header -->
  <header id="header" class="header d-flex align-items-center">
    <div class="container-fluid position-relative d-flex align-items-center px-4">
      <a href="dashboard.html" class="logo d-flex align-items-center me-auto text-decoration-none">
        <h1 class="sitename mb-0 fs-3">SkillSwapHub</h1>
      </a>
      <div class="d-flex align-items-center gap-3">
        <a href="#" onclick="logout(); return false;" class="btn btn-outline-primary btn-sm px-3"><i class="bi bi-box-arrow-right me-1"></i> Logout</a>
      </div>
    </div>
  </header>

  <div class="dashboard-wrapper">
    <!-- Sidebar -->
    <aside class="dashboard-sidebar">
      <div class="mb-4 d-none d-md-block px-3">
        <p class="text-uppercase small fw-bold text-muted mb-2 tracking-wider">Main Menu</p>
      </div>
      <nav class="nav flex-column gap-2 border-0">
        <a class="nav-link text-decoration-none" href="dashboard.html">
          <i class="bi bi-grid-1x2-fill"></i> My Dashboard
        </a>
        <a class="nav-link text-decoration-none" href="browse-skills.html">
          <i class="bi bi-search"></i> Browse Community
        </a>
        <a class="nav-link text-decoration-none" href="profile.html">
          <i class="bi bi-person-circle"></i> User Profile
        </a>
        <a class="nav-link text-decoration-none mt-4 text-muted" href="#" onclick="logout(); return false;">
          <i class="bi bi-box-arrow-left"></i> Sign Out
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-content w-100">
      
      <section class="page-title text-center rounded-3 mb-4 py-5 shadow-sm">
        <div class="container">
          <h1 class="mb-2">Add a New Skill</h1>
          <p class="mb-0">Share a skill you can teach others to get more swap requests</p>
        </div>
      </section>

      <div class="container-fluid px-0">
        <div class="row justify-content-center">
          <div class="col-lg-6 col-md-8">
            <div class="dashboard-card p-5">
              <form id="addSkillForm">
                
                <div class="mb-4">
                  <label class="form-label fw-bold">Skill Name <span class="text-danger">*</span></label>
                  <input type="text" id="skill-name" class="form-control form-control-lg" placeholder="e.g., React Native Development" required autofocus>
                  <div class="form-text mt-2">Be specific to attract the right learners to swap with!</div>
                </div>
              
                <div class="mb-4 pb-2">
                  <label class="form-label fw-bold">Skill Description (Optional)</label>
                  <textarea id="skill-description" class="form-control form-control-lg" rows="5" placeholder="Briefly describe what you can teach..."></textarea>
                </div>
              
                <p class="text-danger small fw-semibold" id="skill-error"></p>
              
                <div class="d-flex gap-3 mt-4 pt-3 border-top border-light">
                  <a href="dashboard.html" class="btn btn-outline-secondary px-4 py-2 flex-grow-1">Cancel</a>
                  <button type="submit" class="btn btn-primary px-4 py-2 flex-grow-1 shadow-sm fw-bold">Publish Skill</button>
                </div>
              
              </form>
            </div>
          </div>
        </div>
      </div>
      
    </main>
  </div>

  <footer class="custom-footer text-center py-4">
    <div class="container">
      <p class="mb-0">© <strong>SkillSwapHub</strong> All Rights Reserved. Swap skills, not money!</p>
    </div>
  </footer>

  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../js/skills.js"></script>
</body>
</html>
